<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>캡슐 최적조합 계산기</title>
    <style>
      body {
        font-family: "Pretendard", sans-serif;
        background: #f4f7f6;
        margin: 0;
        padding: 20px;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      /* 상단 컨트롤 영역 (인원 설정) */
      .top-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #e3f2fd;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      .top-controls label {
        font-weight: bold;
        color: #1565c0;
      }
      .count-input-group {
        display: flex;
        gap: 8px;
      }
      .count-input-group input {
        width: 60px;
        padding: 8px;
        text-align: center;
        border: 1px solid #90caf9;
        border-radius: 6px;
        font-weight: bold;
      }
      .btn-apply {
        background: #1565c0;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-apply:active {
        background: #0d47a1;
      }

      .btn-calc {
        cursor: pointer;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        width: 100%;
        transition: 0.2s;
        background: #007aff;
        color: white;
      }
      .btn-calc:active {
        background: #005bb5;
      }

      .player-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid #eee;
      }
      .player-row input {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        text-align: center;
      }
      .input-name {
        width: 70px;
      }
      /* 숫자 입력칸에서 스피너(위아래 화살표) 숨기기 */
      .input-score {
        width: 50px;
      }
      .input-score::-webkit-outer-spin-button,
      .input-score::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .btn-gender {
        padding: 8px;
        width: 50px;
        font-size: 14px;
        border-radius: 6px;
        cursor: pointer;
      }
      .gender-m {
        background: #e3f2fd;
        color: #1976d2;
        border: 1px solid #90caf9;
      }
      .gender-f {
        background: #fce4ec;
        color: #c2185b;
        border: 1px solid #f48fb1;
      }
      .total-score {
        font-weight: bold;
        width: 40px;
        text-align: right;
        color: #555;
      }

      #result-box {
        margin-top: 20px;
        padding: 15px;
        background: #fffde7;
        border: 2px dashed #fbc02d;
        border-radius: 8px;
        display: none;
      }
      .team-item {
        background: white;
        padding: 10px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>🎳 미사540 캡슐 최적 조합 계산기</h2>

      <div class="top-controls">
        <label>참여 인원 설정</label>
        <div class="count-input-group">
          <input type="number" id="player-count" value="8" min="1" max="20" />
          <button class="btn-apply" onclick="setPlayerCount()">적용</button>
        </div>
      </div>

      <datalist id="presetNameList"></datalist>

      <div id="player-list"></div>

      <button class="btn-calc" onclick="calculate()">
        🚀 최소 벌금 조합 계산하기
      </button>

      <div id="result-box">
        <h3 id="result-title" style="margin-top: 0; color: #d32f2f"></h3>
        <div id="result-teams"></div>
      </div>
    </div>

    <script>
      const PRESET_NAMES = [
        "고영훈",
        "정병인",
        "장혁준",
        "김단비",
        "김민수",
        "김부규",
        "김우진",
        "문종덕",
        "박도은",
        "박종철",
        "서재원",
        "송영준",
        "송지웅",
        "신현민",
        "안진아",
        "유인형",
        "이덕연",
        "김지혜",
        "한소망",
      ];

      let players = Array.from({ length: 8 }, (_, i) => ({
        id: i,
        name: "",
        gender: "남",
        score1: "",
        score2: "",
      }));

      function initPresets() {
        const datalist = document.getElementById("presetNameList");
        datalist.innerHTML = "";
        PRESET_NAMES.forEach((name) => {
          const option = document.createElement("option");
          option.value = name;
          datalist.appendChild(option);
        });
      }

      function setPlayerCount() {
        const inputCount = parseInt(
          document.getElementById("player-count").value,
          10,
        );
        if (isNaN(inputCount) || inputCount < 1) {
          alert("올바른 인원수를 입력해주세요.");
          return;
        }

        const newPlayers = [];
        for (let i = 0; i < inputCount; i++) {
          if (i < players.length) {
            newPlayers.push(players[i]);
          } else {
            newPlayers.push({
              id: i,
              name: "",
              gender: "남",
              score1: "",
              score2: "",
            });
          }
        }
        players = newPlayers;
        render();
      }

      function render() {
        const listDiv = document.getElementById("player-list");
        listDiv.innerHTML = "";

        players.forEach((p, index) => {
          const row = document.createElement("div");
          row.className = "player-row";
          const total = (Number(p.score1) || 0) + (Number(p.score2) || 0);

          // onkeyup 대신 oninput을 사용하고, 렌더링 대신 합계 DOM만 직접 조작하도록 수정
          row.innerHTML = `
        <input type="text" class="input-name" list="presetNameList" placeholder="이름" value="${p.name}" onchange="updateData(${index}, 'name', this.value)">
        <button class="btn-gender ${p.gender === "남" ? "gender-m" : "gender-f"}" onclick="toggleGender(${index})">${p.gender}</button>
        <input type="number" inputmode="numeric" class="input-score" placeholder="1겜" value="${p.score1}" oninput="updateScore(${index}, 'score1', this.value)">
        <input type="number" inputmode="numeric" class="input-score" placeholder="2겜" value="${p.score2}" oninput="updateScore(${index}, 'score2', this.value)">
        <div class="total-score" id="total-${index}">${total || 0}</div>
      `;
          listDiv.appendChild(row);
        });
      }

      function updateData(index, field, value) {
        players[index][field] = value;
      }

      // 💡 포커스 끊김 방지용 핵심 함수: 화면을 다시 그리지 않고 합계 숫자만 업데이트
      function updateScore(index, field, value) {
        players[index][field] = value;
        const total =
          (Number(players[index].score1) || 0) +
          (Number(players[index].score2) || 0);
        document.getElementById(`total-${index}`).innerText = total || 0;
      }

      function toggleGender(index) {
        players[index].gender = players[index].gender === "남" ? "여" : "남";
        render();
      }

      initPresets();
      render();

      function getTargetScore(team) {
        const mCount = team.filter((p) => p.gender === "남").length;
        const fCount = team.length - mCount;
        const size = team.length;
        if (size === 1) {
          return mCount === 1 ? 360 : 340;
        }
        if (size === 2) {
          return mCount === 2 ? 700 : mCount === 1 ? 680 : 660;
        }
        if (size === 3) {
          if (mCount === 3) return 1050;
          if (mCount === 2) return 1020;
          if (mCount === 1) return 1010;
          return 990;
        }
        return 0;
      }

      function calculatePenalty(team) {
        const targetScore = getTargetScore(team);
        const actualScore = team.reduce((sum, p) => sum + p.score, 0);
        const diff = targetScore - actualScore;
        return diff <= 0 ? 0 : Math.ceil(diff / 10) * 1000;
      }

      function findBestCombination(targetPlayers) {
        let minPenalty = Infinity;
        let bestTeams = [];

        function dfs(unassigned, currentTeams, currentPenalty) {
          if (currentPenalty >= minPenalty) return;
          if (unassigned.length === 0) {
            if (currentPenalty < minPenalty) {
              minPenalty = currentPenalty;
              bestTeams = [...currentTeams];
            }
            return;
          }

          const p1 = unassigned[0];
          const rest = unassigned.slice(1);

          const team1 = [p1];
          dfs(
            rest,
            [...currentTeams, team1],
            currentPenalty + calculatePenalty(team1),
          );

          for (let i = 0; i < rest.length; i++) {
            const p2 = rest[i];
            const team2 = [p1, p2];
            const nextRest = rest.filter((_, idx) => idx !== i);
            dfs(
              nextRest,
              [...currentTeams, team2],
              currentPenalty + calculatePenalty(team2),
            );
          }

          for (let i = 0; i < rest.length; i++) {
            for (let j = i + 1; j < rest.length; j++) {
              dfs(
                rest.filter((_, idx) => idx !== i && idx !== j),
                [...currentTeams, [p1, rest[i], rest[j]]],
                currentPenalty + calculatePenalty([p1, rest[i], rest[j]]),
              );
            }
          }
        }
        dfs(targetPlayers, [], 0);
        return { minPenalty, bestTeams };
      }

      function calculate() {
        const validPlayers = players
          .filter((p) => p.name.trim() !== "")
          .map((p) => ({
            name: p.name,
            gender: p.gender,
            score: (Number(p.score1) || 0) + (Number(p.score2) || 0),
          }));
        if (validPlayers.length === 0) {
          alert("데이터를 입력해주세요!");
          return;
        }

        const result = findBestCombination(validPlayers);
        const resultBox = document.getElementById("result-box");
        const resultTeams = document.getElementById("result-teams");

        resultBox.style.display = "block";
        document.getElementById("result-title").innerHTML =
          `총 벌금: ${result.minPenalty.toLocaleString()}원 💸`;
        resultTeams.innerHTML = "";
        result.bestTeams.forEach((team, idx) => {
          const names = team.map((p) => p.name).join(", ");
          const total = team.reduce((sum, p) => sum + p.score, 0);
          resultTeams.innerHTML += `
        <div class="team-item">
          <strong>${idx + 1}팀 (${team.length}인조)</strong> : ${names}<br>
          <span style="font-size: 13px; color: #555;">합계 ${total}점 (목표 ${getTargetScore(team)}점) → <b>벌금 ${calculatePenalty(team)}원</b></span>
        </div>`;
        });
      }
    </script>
  </body>
</html>
