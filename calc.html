<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>볼링 캡슐 게임 최적조합 계산기</title>
  <style>
    body { font-family: 'Pretendard', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; margin-bottom: 20px; }
    
    /* 상단 컨트롤 영역 (인원 설정) */
    .top-controls { display: flex; justify-content: space-between; align-items: center; background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .top-controls label { font-weight: bold; color: #1565c0; }
    .count-input-group { display: flex; gap: 8px; }
    .count-input-group input { width: 60px; padding: 8px; text-align: center; border: 1px solid #90caf9; border-radius: 6px; font-weight: bold; }
    .btn-apply { background: #1565c0; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .btn-apply:active { background: #0d47a1; }

    .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
    button { cursor: pointer; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; width: 100%; transition: 0.2s; }
    .btn-dummy { background: #e0e0e0; color: #333; }
    .btn-calc { background: #007aff; color: white; }
    
    .player-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
    .player-row input { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; text-align: center; }
    .input-name { width: 70px; }
    .input-score { width: 50px; }
    
    .btn-gender { padding: 8px; width: 50px; font-size: 14px; border-radius: 6px; }
    .gender-m { background: #e3f2fd; color: #1976d2; border: 1px solid #90caf9; }
    .gender-f { background: #fce4ec; color: #c2185b; border: 1px solid #f48fb1; }
    .total-score { font-weight: bold; width: 40px; text-align: right; color: #555; }

    #result-box { margin-top: 20px; padding: 15px; background: #fffde7; border: 2px dashed #fbc02d; border-radius: 8px; display: none; }
    .team-item { background: white; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #ddd; }
  </style>
</head>
<body>

<div class="container">
  <h2>🎳 최적의 팀 조합 찾기</h2>

  <!-- 인원수 설정 영역 -->
  <div class="top-controls">
    <label>참여 인원 설정</label>
    <div class="count-input-group">
      <input type="number" id="player-count" value="8" min="1" max="20">
      <button class="btn-apply" onclick="setPlayerCount()">적용</button>
    </div>
  </div>
  
  <div class="btn-group">
    <button class="btn-dummy" onclick="loadDummyData()">테스트용 데이터 채우기</button>
  </div>

  <!-- HTML5 Native 자동완성(Datalist)을 위한 공간 -->
  <datalist id="presetNameList"></datalist>

  <div id="player-list"></div>

  <button class="btn-calc" onclick="calculate()">🚀 최소 벌금 조합 계산하기</button>

  <div id="result-box">
    <h3 id="result-title" style="margin-top: 0; color: #d32f2f;"></h3>
    <div id="result-teams"></div>
  </div>
</div>

<script>
  // ==========================================
  // 📝 미리 설정해둘 이름 목록 
  // (여기에 볼링 클럽 회원들 이름을 자유롭게 추가/수정하세요!)
  // ==========================================
  const PRESET_NAMES = [
    '고영훈', '정병인', '장혁준', '김단비', '김민수', 
    '김부규', '김우진', '문종덕', '박도은', '박종철',
    '서재원', '송영준', '송지웅', '신현민', '안진아',
    '유인형', '이덕연', '김지혜', '한소망'
  ];

  // ==========================================
  // 1. 상태 및 렌더링
  // ==========================================
  let players = Array.from({length: 8}, (_, i) => ({
    id: i, name: '', gender: '남', score1: '', score2: ''
  }));

  // 페이지 로드 시 이름 목록(datalist) 초기화
  function initPresets() {
    const datalist = document.getElementById('presetNameList');
    datalist.innerHTML = '';
    PRESET_NAMES.forEach(name => {
      const option = document.createElement('option');
      option.value = name;
      datalist.appendChild(option);
    });
  }

  // 인원수 변경 적용 함수
  function setPlayerCount() {
    const inputCount = parseInt(document.getElementById('player-count').value, 10);
    if (isNaN(inputCount) || inputCount < 1) {
      alert('올바른 인원수를 입력해주세요.');
      return;
    }

    const newPlayers = [];
    for (let i = 0; i < inputCount; i++) {
      if (i < players.length) {
        newPlayers.push(players[i]); // 기존 데이터 유지
      } else {
        newPlayers.push({ id: i, name: '', gender: '남', score1: '', score2: '' }); // 새 빈칸 추가
      }
    }
    players = newPlayers;
    render();
  }

  function render() {
    const listDiv = document.getElementById('player-list');
    listDiv.innerHTML = '';
    
    players.forEach((p, index) => {
      const row = document.createElement('div');
      row.className = 'player-row';
      const total = (Number(p.score1) || 0) + (Number(p.score2) || 0);
      
      // 이름 input에 list="presetNameList" 속성을 추가하여 자동완성 연결
      row.innerHTML = `
        <input type="text" class="input-name" list="presetNameList" placeholder="이름" value="${p.name}" onchange="updateData(${index}, 'name', this.value)">
        <button class="btn-gender ${p.gender === '남' ? 'gender-m' : 'gender-f'}" onclick="toggleGender(${index})">${p.gender}</button>
        <input type="number" class="input-score" placeholder="1겜" value="${p.score1}" onkeyup="updateData(${index}, 'score1', this.value)">
        <input type="number" class="input-score" placeholder="2겜" value="${p.score2}" onkeyup="updateData(${index}, 'score2', this.value)">
        <div class="total-score">${total || 0}</div>
      `;
      listDiv.appendChild(row);
    });
  }

  function updateData(index, field, value) {
    players[index][field] = value;
    if (field === 'score1' || field === 'score2') render();
  }

  function toggleGender(index) {
    players[index].gender = players[index].gender === '남' ? '여' : '남';
    render();
  }

  // 초기화 실행
  initPresets();
  render();

  // ==========================================
  // 2. 알고리즘 (기존과 완벽히 동일)
  // ==========================================
  function loadDummyData() {
    const dummies = [
      { name: '김남일', gender: '남', score1: 170, score2: 185 }, { name: '이남이', gender: '남', score1: 160, score2: 170 },
      { name: '박여일', gender: '여', score1: 180, score2: 165 }, { name: '최여이', gender: '여', score1: 150, score2: 160 },
      { name: '정남삼', gender: '남', score1: 190, score2: 180 }, { name: '강남사', gender: '남', score1: 170, score2: 170 },
      { name: '조여삼', gender: '여', score1: 165, score2: 160 }, { name: '윤여사', gender: '여', score1: 175, score2: 160 }
    ];
    // 현재 설정된 인원수 내에서만 더미데이터 채우기
    dummies.forEach((d, i) => {
      if (i < players.length) {
        players[i] = { id: i, ...d };
      }
    });
    render();
  }

  function getTargetScore(team) {
    const mCount = team.filter(p => p.gender === '남').length;
    const fCount = team.length - mCount;
    const size = team.length;
    if (size === 1) { return mCount === 1 ? 360 : 340; }
    if (size === 2) { return mCount === 2 ? 700 : (mCount === 1 ? 680 : 660); }
    if (size === 3) {
      if (mCount === 3) return 1050;
      if (mCount === 2) return 1020;
      if (mCount === 1) return 1010;
      return 990;
    }
    return 0; 
  }

  function calculatePenalty(team) {
    const targetScore = getTargetScore(team);
    const actualScore = team.reduce((sum, p) => sum + p.score, 0);
    const diff = targetScore - actualScore;
    return diff <= 0 ? 0 : Math.ceil(diff / 10) * 1000;
  }

  function findBestCombination(targetPlayers) {
    let minPenalty = Infinity;
    let bestTeams = [];

    function dfs(unassigned, currentTeams, currentPenalty) {
      if (currentPenalty >= minPenalty) return;
      if (unassigned.length === 0) {
        if (currentPenalty < minPenalty) {
          minPenalty = currentPenalty;
          bestTeams = [...currentTeams];
        }
        return;
      }

      const p1 = unassigned[0];
      const rest = unassigned.slice(1);

      const team1 = [p1];
      dfs(rest, [...currentTeams, team1], currentPenalty + calculatePenalty(team1));

      for (let i = 0; i < rest.length; i++) {
        const p2 = rest[i];
        const team2 = [p1, p2];
        const nextRest = rest.filter((_, idx) => idx !== i);
        dfs(nextRest, [...currentTeams, team2], currentPenalty + calculatePenalty(team2));
      }

      for (let i = 0; i < rest.length; i++) {
        for (let j = i + 1; j < rest.length; j++) {
          dfs(rest.filter((_, idx) => idx !== i && idx !== j), [...currentTeams, [p1, rest[i], rest[j]]], currentPenalty + calculatePenalty([p1, rest[i], rest[j]]));
        }
      }
    }
    dfs(targetPlayers, [], 0);
    return { minPenalty, bestTeams };
  }

  function calculate() {
    const validPlayers = players.filter(p => p.name.trim() !== '').map(p => ({
        name: p.name, gender: p.gender, score: (Number(p.score1) || 0) + (Number(p.score2) || 0)
    }));
    if (validPlayers.length === 0) { alert("데이터를 입력해주세요!"); return; }

    const result = findBestCombination(validPlayers);
    const resultBox = document.getElementById('result-box');
    const resultTeams = document.getElementById('result-teams');
    
    resultBox.style.display = 'block';
    document.getElementById('result-title').innerHTML = `총 벌금: ${result.minPenalty.toLocaleString()}원 💸`;
    resultTeams.innerHTML = '';
    result.bestTeams.forEach((team, idx) => {
      const names = team.map(p => p.name).join(', ');
      const total = team.reduce((sum, p) => sum + p.score, 0);
      resultTeams.innerHTML += `
        <div class="team-item">
          <strong>${idx + 1}팀 (${team.length}인조)</strong> : ${names}<br>
          <span style="font-size: 13px; color: #555;">합계 ${total}점 (목표 ${getTargetScore(team)}점) → <b>벌금 ${calculatePenalty(team)}원</b></span>
        </div>`;
    });
  }
</script>
</body>
</html>
